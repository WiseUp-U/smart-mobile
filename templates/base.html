<!DOCTYPE html>
<html>
<head>
    <title>Mobile Shop</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <div class="logo">
        <a href="{{ url_for('index') }}" style="font-weight:bold; font-size:24px;">Smart-Mobile</a>
    </div>
    
    {% if session.get('admin') %}
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('admin_logout') }}">Logout</a>
    {% else %}
        <a href="{{ url_for('admin_login') }}">Admin Login</a>
    {% endif %}

    <div class="nav-search">
        <form action="{{ url_for('index') }}" method="get" class="search-form">
            <input type="text" name="q" placeholder="Search products..." value="{{ request.args.get('q', '') }}">
            <button type="submit">Search</button>
        </form>
    </div>
</header>

<div class="page-transition show" id="page-transition">
        {% block content %}{% endblock %}
</div>

<script>
// Add class when scrolling for stronger shadow effect
window.addEventListener('scroll', function() {
    const header = document.querySelector('header');
    if(window.scrollY > 10){
        header.classList.add('scrolled');
    } else {
        header.classList.remove('scrolled');
    }
});
</script>

<script>
const links = document.querySelectorAll('a[href]');

links.forEach(link => {
    link.addEventListener('click', e => {
        const url = link.getAttribute('href');

        // ✅ Skip special links
        if (
            url.startsWith('http') ||
            url.startsWith('tel:') ||
            url.startsWith('mailto:') ||
            url.startsWith('#') ||
            link.target === '_blank'
        ) return;

        e.preventDefault();

        const page = document.getElementById('page-transition');
        page.classList.remove('show');

        setTimeout(() => {
            window.location.href = url;
        }, 300);
    });
});

// Fix for back button (pageshow event)
window.addEventListener('pageshow', function () {
    document.getElementById('page-transition').classList.add('show');
});
</script>

</body>
</html>
